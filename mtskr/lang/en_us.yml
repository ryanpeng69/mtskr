tutorial:
  home:
    intro: <u><click:open_url:https://github.com/ryanpeng69/mtskr>MTskR</click></u> is a <u><click:open_url:https://github.com/SkriptLang/Skript>Skript</click></u> project by <u><click:open_url:https://github.com/ryanpeng69>RyanPeng69</click></u>.\nBringing <u><click:open_url:https://modrinth.com/project/XKPAmI6u>Jonathan Ho's Minecraft Transit Railway mod</click></u> into a Paper Server.
    btn:
      items_gui: "Items GUI"
      cmd: "View Commands"
      create_railway: "Create Your First Railway"
  command:
    non_op: |
      &bMTskR Command
      &7 - &e/mtskr
      &7  - &ehelp&7|&etutorial &6Show the MTskR tutorial.
      &7  - &elang <key> &6Change your language.
    1: |
      &bMTskR Command
      &7 - &e/mtskr
      &7  - &econfig
      &7    - &eget <key> &6View the value of a key.
      &7    - &elist &6See all keys and values.
      &7    - &ereset &6Reset the config to default.
      &7    - &eset <key> <value> &6Modify the config.
      &7  - &eedit <x>,<y>,<z> <x>,<y>,<z> &6Open the dialog to edit rail.<ttp:You can simply click on the first node of the rail with MTskR Brush to do the same.>&2*<reset>
      &7    - &egoto &6Teleport to the middle of the rail.
      &7    - &ename <name> &6Set the name of the rail.
      &7    - &eroute &7(siding) &6Select the route for the rail by ID. Use /mtskr route to view routes with IDs.
      &7    - &eschedule &7(siding) &6Change the interval <ttp:seconds>&2*<reset> &6before the train departs.
      &7    - &estop &7(siding) &6Stop all trains of the siding.
      &7    - &estop_time &7(platform) &6How long the trains will stop.<ttp:seconds>&2*<reset>
      &7    - &etrain &7(siding) &6Select the train model for the siding.
      &7←<reset> &fPage 1&7/&f3 <cmd:mtskr help cmd 2>&f→<reset>
    2: |
      &bMTskR Command
      &7 - &e/mtskr
      &7  - &egui &6Opens the GUI to get items.
      &7  - &ehelp&7|&etutorial &6Show the MTskR tutorial.
      &7  - &elang <key> &6Change your language.
      &7  - &emodel
      &7    - &ecreate <name> [-f] &6Create a new model with the selected area.<ttp:Use -f to overwrite.>&2*<reset>
      &7    - &edownload &6Open the list of models on the <link:https://mtskr.up.railway.app/models>web<reset> &6in a GUI.
      &7    - &elist &6View all models.
      &7    - &erebuild &6Spawn the model as blocks to rebuild.<ttp:When done, use the same command as create and add -f to overwrite the existing one.>&2*<reset>
      &7  - &ereload
      &7    - &eall&7|&escripts &6Reloads everything.
      &7    - &econfig &6Reloads config.
      &7    - &edata &6Reloads data.
      &7    - &elang &6Reloads language files.
      &7    - &escript <script> &6Reloads one script.
      &7    - &escripts &6Reloads all scripts.
      &7<cmd:mtskr help cmd 2>&f←<reset> &fPage 2&7/&f3 <cmd:mtskr help cmd 3>&f→<reset>
    3: |
      &bMTskR Command
      &7 - &e/mtskr
      &7  - &eroute
      &7    - &elist &6List all routes with IDs to remove.
      &7    - &eremove <id> &6Delete the route.
      &7<cmd:mtskr help cmd 2>&f←<reset> &fPage 3&7/&f3 &7→<reset>
  create_railway:
    1: |
      &bStep 1 &7- &6Learning about Items
      &eYou received the items<ttp:You can always get these items again using '/mtskr gui'.>&2*<reset>&e. Let's start:
      &7 - &eBrush&7: &6This item lets you view and edit rails.<ttp:Click on a rail node to use; sneak click to edit.>&2*<reset>
      &7 - &eRail Node&7: &6Every rail must be placed on this.
      &7 - &eSiding Rail Connector&7: &6This rail connector creates a siding for your route. A siding is where the train will spawn. 
      &7 - &eOne Way Rail Connector&7: &6This rail connector creates a one-way rail between nodes. Use it to connect sidings and platforms.
      &7 - &eDouble Way Rail Connector&7: &6This rail connector allows the train to move in both directions.
      &7 - &ePlatform Rail Connector&7: &6This creates a platform for the train to stop and pick up passengers.
      &7 - &ePlatform Block&7: &6Players must be on this block to get into trains when the train is stopped at a platform.
      &7 - &eRoute Creator&7: &6Click on 1 or more nodes, then sneak click to make a route.<ttp:Ensure the rails you connected can lead the train out of and back into the siding. The siding can be entered from both sides.>&2*<reset>

      <ttp:Click to continue><cmd:mtskr help create_railway 2>&eAfter reading the above, click to use &6/mtskr help create_railway 2 &eto continue.
    2: |
      &bStep 2 &7- &6Create Sidings
      &b1. &ePlace a rail node.
      &b2. &ePlace another one on the same x or z coordinate.<ttp:Ensure the distance between these two nodes is at least the length of your train.>&2*<reset>
      &b3. &eConnect these 2 nodes with a &6Siding Rail Connector&e.<ttp:The train will move away from the siding from the second node you clicked, meaning the direction of the siding is the direction of the train.>&2*<reset>

      <ttp:Click to continue><cmd:mtskr help create_railway 3>&eClick to use &6/mtskr help create_railway 3 &eto continue.
    3: |
      &bStep 3 &7- &6Create Platforms
      &b1. &eChoose a place you want the train to stop at.
      &b2. &eCreate a platform rail using a &6Platform Rail Connector &ejust like creating sidings.<ttp:Platforms are one-direction rails. You have to place a rail from the opposite direction to allow trains from the other side.>&2*<reset>
      &b3. &eAdd as many platforms around the world as you want.

      <ttp:Click to continue><cmd:mtskr help create_railway 4>&eClick to use &6/mtskr help create_railway 4 &eto continue.
    4: |
      &bStep 4 &7- &6Connecting Rails
      &b1. &eUse the normal rail connectors<ttp:The one way rail connector and the two-way rail connector.>&2*<reset> &eto connect your sidings to the platforms. Make sure the rail can lead the train back to the siding.
      &b2. &eTake out a &6Route Creator.
      &b3. &eClick on the required nodes for the &6outbound &eof your route; the trains for this route will pass through these nodes. More nodes will be calculated when the route is loaded by a siding.<ttp:You don't have to select every node, but it will improve the calculation when you have a complex system.>&2*<reset>
      &b4. &eSneak right-click with the same route creator. It will open a dialog to create a route.
      &b5. &eWrite a name that ends with &6.out &eor &6||out &eand choose a color below.
      &b6. &eClick &6Create&e.
      &b7. &eType <cmd:mtskr route>&6/mtskr route<reset> &eto view the route you just created and memorize the id.
      &b8. &eSelect the nodes for the &6inbound&e.
      &b9. &eCreate a route named &6#&7<&6id&7>&6.in &eor &6#&7<&6id&7>&6||in&e, replace &6<id> &ewith the one you just got at step 7.

      <ttp:Click to continue><cmd:mtskr help create_railway 5>&eClick to use &6/mtskr help create_railway 5 &eto continue.
    5: |
      &bStep 5 &7- &6Modifying Sidings
      &b1. &eTake the &6MTskR Brush.
      &b2. &eSneak click on the first node of the siding<ttp:The node that you clicked first to create the siding.>&2*<reset> &eto open the dialog.
      &b3. &eThe schedule decides how often the train will depart. You can modify it if you want. Click 'update' when done editing the name or schedule.
      &b4. &eSelect the train for the siding. If you don't have any trains, use <ttp:Click to use><cmd:mtskr models download>&6/mtskr model download<reset> &eor visit <link:https://mtskr.up.railway.app/models>&6the web<reset> &eto download one.
      &b5. &eSelect the route you just created in 'Select Route'.
      &b6. &eClick on 'Refresh Route'. It will calculate the path passing through all mentioned nodes and back to the siding. Trains will start moving.
      &eYou can modify a platform in the same way as modifying a siding.

      &aEnjoy your journey! &7- &o<link:https://github.com/ryanpeng69>RyanPeng69 2026/7/16<reset>

      &7<link:https://github.com/ryanpeng69/mtskr>GitHub<reset> &8| &7<link:https://discord.gg/kSSmEyVSRR>Discord<reset> &8| &7<link:https://mtskr.up.railway.app/>Web<reset>      
items: # It is not a good idea to change the size or format of the lines.
  brush:
    name: "&fBrush"
    lores: |-
      &7The tool to edit MTskR blocks.
      &7Click on a rail node to view rails connected to it.
      &7Sneak click a rail node to modify sidings & platforms.
      &7Click on editable blocks to edit.
  tutorial:
    name: "&fMTskR Tutorial"
    lores: |-
      &dMinecraft TrainSkript Railway
  loc_selector:
    name: "&fLocation Selector"
    lores: |-
      &7Select 2 locations just like WorldEdit.
      &7Use &f/mtskr model create <name> &7to create a model.
  route_creator:
    name: "&fRoute Creator"
    lores: |-
      &7Click on rail nodes to select them.
      &7You don't have to select every node;
      &7more nodes will be found automatically.
      &7Sneak click to create a route.
      &7Selected nodes:
  # Blocks
  model_seat:
    name: "&fModel Seat"
    lores: |-
      &7Place in train models to make a seat.
      &7Players cannot stand on trains.
  rail_node:
    name: "&fRail Node"
    lores: |-
      &7Connect rails on this block.
      &7Any stone button will work.
  platform_block:
    name: "&fPlatform Block"
    lores: |-
      &7Passengers must be on this block to get on trains.
      &7Place by the train's door when the train stops.
  arrival_sign:
    name: "&fArrival Sign"
    lores: |-
      &7This will place a temporary sign.
      &7Right-click with a brush to select a siding.
      &7Place again to edit.
  # Rail Connectors
  normal_rail_connector:
    name: "&fTwo-Way Rail Connector"
    lores: |-
      &7The normal rail between sidings and platforms.
      &7The train will be able to move in both directions.
      &7Click on 2 rail nodes to connect.
      &7Selected location: &f%loc%
  one_way_rail_connector:
    name: "&fOne Way Rail Connector"
    lores: |-
      &7The normal rail between sidings and platforms.
      &7Trains can only move in 1 direction.
      &7Click on 2 rail nodes to connect.
      &7Selected location: &f%loc%
  platform_rail_connector:
    name: "&fPlatform Rail Connector"
    lores: |-
      &7The rail for trains to stop at platforms.
      &7Sneak click to edit rail with a brush.
      &7Click on 2 rail nodes to connect.
      &7Selected location: &f%loc%
  siding_rail_connector:
    name: "&fSiding Rail Connector"
    lores: |-
      &7The rail for trains to spawn and start.
      &7Sneak click to edit rail with a brush.
      &7Click on 2 rail nodes to connect.
      &7Selected location: &f%loc%
  turnback_rail_connector:
    name: "&fTurnback Rail Connector"
    lores: |-
      &7The rail for trains to reverse direction.
      &7Trains can reverse or just pass through.
      &7Click on 2 rail nodes to connect.
      &7Selected location: &f%loc%
  remove_rail_connector:
    name: "&fRail Remover"
    lores: |-
      &7Remove the rails between 2 nodes.
      &7Will remove both directions.
      &7Click on 2 rail nodes to remove.
      &7Selected location: &f%loc%
  # Building Tools
  bridge_creator:
    name: "&f%width% Blocks Wide Bridge Creator"
    general_name: "Bridge Creator"
    lores: |-
      &7Instantly build bridges for tracks.
      &7Click on a rail node to place.
      &7Sneak right-click to select a block.
      &7Selected block: &f%block%
      &7Selected location: &f%loc%
  tunnel_creator:
    name: "&f%width%x%height% Tunnel Creator"
    general_name: "Tunnel Creator"
    lores: |-
      &7Instantly dig tunnels for tracks.
      &7Click on a rail node to place.
      &7Selected location: &f%loc%
  tunnel_wall_creator:
    name: "&f%width%x%height% Tunnel Wall Creator"
    general_name: "Tunnel Wall Creator"
    lores: |-
      &7Instantly build walls for tunnels.
      &7Click on a rail node to place.
      &7Sneak right-click to select a block.
      &7Selected block: &f%block%
      &7Selected location: &f%loc%
